name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build-and-push:
    needs: checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.SHORT_SHA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/caixetadev/portfolio:latest
            ghcr.io/caixetadev/portfolio:${{ steps.vars.outputs.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          BODY="{\"version\":\"$VERSION\"}"
          SIGNATURE=$(echo -n $BODY | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_SECRET }}" | sed 's/^.* //')

          curl -X POST https://deploy.caixeta.dev \
            -H "Content-Type: application/json" \
            -H "X-Signature: $SIGNATURE" \
            -d "$BODY"
